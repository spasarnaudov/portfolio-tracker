{% extends "base.html" %}

{% block title %}Prices - Portfolio Tracker{% endblock %}

{% block content %}
    <h2>Prices</h2>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Name</th>
                <th>Date</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            {% for price in prices %}
                <tr>
                    <td>{{ price[0] }}</td>
                    <td>{{ price[1] }}</td>
                    <td>{{ price[2] }}</td>
                    <td>{{ price[3] }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
