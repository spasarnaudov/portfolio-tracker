{% extends "base.html" %}

{% block title %}Prices - Portfolio Tracker{% endblock %}

{% block content %}
    <h2>Prices</h2>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Name</th>
                <th>Date</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            {% for price in prices %}
                <tr>
                    <td>{{ price.symbol }}</td>
                    <td>{{ price.name }}</td>
                    <td>{{ price.price_date }}</td>
                    <td>{{ price.price }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
