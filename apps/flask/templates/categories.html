{% extends "base.html" %}

{% block title %}Categories - Portfolio Tracker{% endblock %}

{% block content %}
    <h2>Categories</h2>

    <div class="table-scroll">
        <table border="1" cellpadding="8">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                </tr>
            </thead>
            <tbody>
                {% for category in categories %}
                    <tr>
                        <td>{{ category.id }}</td>
                        <td>{{ category.name }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
