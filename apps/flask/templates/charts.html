{% extends "base.html" %}

{% block title %}Charts - Portfolio Tracker{% endblock %}

{% block content %}
    <form id="chartFilters" method="get" action="{{ url_for('charts') }}"></form>

    <div id="chartsContent" aria-live="polite">
        {% include "_charts_content.html" %}
    </div>

    <script>
        const chartFiltersForm = document.getElementById("chartFilters");
        const chartsContent = document.getElementById("chartsContent");
        let chartRequestController = null;

        function setupChartContent() {
            chartsContent.querySelectorAll("[data-chart-filter]").forEach((control) => {
                control.addEventListener("change", () => submitChartFilters());
            });

            chartsContent.querySelectorAll(".custom-date-fields").forEach((dateFields) => {
                const startInput = dateFields.querySelector('[name="chart_start_date"]');
                const endInput = dateFields.querySelector('[name="chart_end_date"]');

                if (startInput && endInput) {
                    startInput.max = endInput.value;
                    endInput.min = startInput.value;
                }
            });

            chartsContent.querySelectorAll(".price-chart").forEach((chartCanvas) => {
                window.PriceCharts.render(chartCanvas);
            });
        }

        async function submitChartFilters(submitter = null) {
            if (chartRequestController) {
                chartRequestController.abort();
            }

            const requestController = new AbortController();
            chartRequestController = requestController;
            const formData = new FormData(chartFiltersForm);

            if (submitter?.name) {
                formData.append(submitter.name, submitter.value);
            }

            const query = new URLSearchParams(formData);
            const requestUrl = `${chartFiltersForm.action}?${query.toString()}`;
            chartsContent.classList.add("charts-loading");
            chartsContent.setAttribute("aria-busy", "true");

            try {
                const response = await fetch(requestUrl, {
                    headers: {
                        "Accept": "text/html",
                        "X-Requested-With": "XMLHttpRequest",
                    },
                    signal: requestController.signal,
                });

                if (!response.ok) {
                    throw new Error(`Chart update failed with status ${response.status}`);
                }

                if (response.redirected) {
                    window.location.assign(response.url);
                    return;
                }

                chartsContent.innerHTML = await response.text();
                window.history.replaceState({}, "", requestUrl);
                setupChartContent();
            } catch (error) {
                if (error.name !== "AbortError") {
                    console.error(error);
                    window.location.assign(requestUrl);
                }
            } finally {
                if (chartRequestController === requestController) {
                    chartRequestController = null;
                    chartsContent.classList.remove("charts-loading");
                    chartsContent.removeAttribute("aria-busy");
                }
            }
        }

        chartFiltersForm.addEventListener("submit", (event) => {
            event.preventDefault();
            submitChartFilters(event.submitter);
        });

        document.addEventListener("DOMContentLoaded", setupChartContent);
    </script>
{% endblock %}
