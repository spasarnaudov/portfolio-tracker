{% if chart_panels %}
    {% for chart_panel in chart_panels %}
        <section class="chart-panel">
            <div class="chart-panel-header">
                <div class="chart-panel-controls">
                    <select class="chart-panel-select" name="chart_range" aria-label="Period" form="chartFilters" data-chart-filter>
                        {% for range_value, range_label in chart_ranges %}
                            <option value="{{ range_value }}" {% if chart_panel.range == range_value %}selected{% endif %}>{{ range_label }}</option>
                        {% endfor %}
                    </select>

                    <select class="chart-panel-select" name="chart_interval" aria-label="Price display" form="chartFilters" data-chart-filter>
                        {% for interval_value, interval_label in chart_intervals %}
                            <option value="{{ interval_value }}" {% if chart_panel.interval == interval_value %}selected{% endif %}>{{ interval_label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button class="remove-chart-button" type="submit" name="remove_chart" value="{{ chart_panel.index }}" form="chartFilters" aria-label="Remove chart">x</button>
            </div>

            <div class="chart-asset-row">
                <select class="chart-title-select" name="chart_asset_id" aria-label="Asset" form="chartFilters" data-chart-filter>
                    {% for asset in chart_panel.selectable_assets %}
                        <option value="{{ asset.id }}" {% if asset.id == chart_panel.asset_id %}selected{% endif %}>
                            {{ asset.symbol }} - {{ asset.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="custom-date-fields" {% if chart_panel.range != "custom" %}hidden{% endif %}>
                <label>
                    <span>Start date</span>
                    <input
                        type="date"
                        name="chart_start_date"
                        value="{{ chart_panel.start_date }}"
                        form="chartFilters"
                        data-chart-filter
                    >
                </label>
                <label>
                    <span>End date</span>
                    <input
                        type="date"
                        name="chart_end_date"
                        value="{{ chart_panel.end_date }}"
                        form="chartFilters"
                        data-chart-filter
                    >
                </label>
            </div>

            {% if chart_panel.has_prices %}
                <canvas
                    class="price-chart"
                    width="900"
                    height="360"
                    data-labels='{{ chart_panel["labels"] | tojson }}'
                    data-values='{{ chart_panel["values"] | tojson }}'
                    data-interval="{{ chart_panel.interval }}"
                ></canvas>
                <p class="chart-info">Click on the chart to inspect a point.</p>
            {% else %}
                <p class="chart-info">No price data available for this asset.</p>
            {% endif %}
        </section>
    {% endfor %}
{% else %}
    <p class="empty-charts-message">Add a chart to start comparing assets.</p>
{% endif %}

<div class="add-chart-row">
    <button class="add-chart-button" type="submit" name="add_chart" value="1" form="chartFilters" {% if not can_add_chart %}disabled{% endif %}>+</button>
</div>
