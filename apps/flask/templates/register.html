{% extends "base.html" %}

{% block title %}Register - Portfolio Tracker{% endblock %}

{% block content %}
    <section class="auth-panel">
        <h2>Register</h2>

        {% if error %}
            <p class="form-error">{{ error }}</p>
        {% endif %}

        <form method="post" action="{{ url_for('register') }}">
            <label>
                Username
                <input
                    class="auth-input"
                    type="text"
                    name="username"
                    autocomplete="username"
                    minlength="3"
                    required
                    autofocus
                >
            </label>

            <label>
                Password
                <input
                    class="auth-input"
                    type="password"
                    name="password"
                    autocomplete="new-password"
                    minlength="8"
                    required
                >
            </label>

            <label>
                Confirm password
                <input
                    class="auth-input"
                    type="password"
                    name="confirm_password"
                    autocomplete="new-password"
                    minlength="8"
                    required
                >
            </label>

            <button type="submit">Create account</button>
        </form>

        <p class="auth-link">
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </p>
    </section>
{% endblock %}
