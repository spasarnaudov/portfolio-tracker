{% extends "base.html" %}

{% block title %}Login - Portfolio Tracker{% endblock %}

{% block content %}
    <section class="auth-panel">
        <h2>Login</h2>

        {% if error %}
            <p class="form-error">{{ error }}</p>
        {% endif %}

        <form method="post" action="{{ url_for('login') }}">
            <input type="hidden" name="next" value="{{ next_url }}">

            <label>
                Username
                <input
                    class="auth-input"
                    type="text"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus
                >
            </label>

            <label>
                Password
                <input
                    class="auth-input"
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </label>

            <button type="submit">Login</button>
        </form>

        <p class="auth-link">
            New user?
            <a href="{{ url_for('register') }}">Create an account</a>
        </p>
    </section>
{% endblock %}
