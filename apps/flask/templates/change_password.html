{% extends "base.html" %}

{% block title %}Change Password - Portfolio Tracker{% endblock %}

{% block content %}
    <section class="auth-panel">
        <h2>Change password</h2>

        {% if error %}
            <p class="form-error">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p class="form-success">{{ success }}</p>
        {% endif %}

        <form method="post" action="{{ url_for('change_password') }}">
            <label>
                Current password
                <input
                    class="auth-input"
                    type="password"
                    name="current_password"
                    autocomplete="current-password"
                    required
                    autofocus
                >
            </label>

            <label>
                New password
                <input
                    class="auth-input"
                    type="password"
                    name="new_password"
                    autocomplete="new-password"
                    minlength="4"
                    required
                >
            </label>

            <label>
                Confirm new password
                <input
                    class="auth-input"
                    type="password"
                    name="confirm_password"
                    autocomplete="new-password"
                    minlength="4"
                    required
                >
            </label>

            <button type="submit">Change password</button>
        </form>
    </section>
{% endblock %}
