{% extends "base.html" %}

{% block title %}Assets - Portfolio Tracker{% endblock %}

{% block content %}
    <h2>Assets</h2>

    <div class="table-scroll">
        <table border="1" cellpadding="8">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Symbol</th>
                    <th>Name</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody>
                {% for asset in assets %}
                    <tr>
                        <td>{{ asset.id }}</td>
                        <td>{{ asset.symbol }}</td>
                        <td>{{ asset.name }}</td>
                        <td>{{ asset.category_name }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
