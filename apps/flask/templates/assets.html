{% extends "base.html" %}

{% block title %}Assets - Portfolio Tracker{% endblock %}

{% block content %}
    <h2>Assets</h2>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>Symbol</th>
                <th>Name</th>
                <th>Category</th>
            </tr>
        </thead>
        <tbody>
            {% for asset in assets %}
                <tr>
                    <td>{{ asset[0] }}</td>
                    <td>{{ asset[1] }}</td>
                    <td>{{ asset[2] }}</td>
                    <td>{{ asset[3] }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
